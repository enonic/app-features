css: "styles/styles.css"
image:
  - name: "editor-style-image-cinema"
    displayName: "Cinema"
    aspectRatio: "21:9"
  - name: "editor-style-image-tall"
    displayName: "Tall"
    aspectRatio: "9:16"
  - name: "editor-style-image-avatar"
    displayName: "Avatar"
    aspectRatio: "1:1"
    filter: "rounded(1000)"
  - name: "editor-style-image-old"
    displayName: "Old photo"
    filter: "sepia(25)"
  - name: "editor-style-image-funky"
    displayName: "Slightly drunk"
