kind: "Style"
styles:
  - name: "editor-style-image-cinema"
    type: "Image"
    label:
      text: "Cinema"
    aspectRatio: "21:9"
  - name: "editor-style-image-tall"
    type: "Image"
    label:
      text: "Tall"
    aspectRatio: "9:16"
  - name: "editor-style-image-avatar"
    type: "Image"
    label:
      text: "Avatar"
    aspectRatio: "1:1"
    filter: "rounded(1000)"
    editor:
      css: |
        .editor-style-image-avatar {
            width: 100px;
            height: 100px;
        }
  - name: "editor-style-image-old"
    type: "Image"
    label:
      text: "Old photo"
    filter: "sepia(25)"
  - name: "editor-style-image-funky"
    type: "Image"
    label:
      text: "Slightly drunk"
    editor:
      css: |
        .editor-style-image-funky {
          width: 100px;
          height: 100px;
          animation: shake 0.5s;
          animation-iteration-count: infinite;
        }
        
        .editor-style-image-funky img {
          animation: shake 0.5s;
          animation-iteration-count: infinite;
        }
        
        @keyframes shake {
          0% { transform: translate(1px, 1px) rotate(0deg); }
          10% { transform: translate(-1px, -2px) rotate(-1deg); }
          20% { transform: translate(-3px, 0px) rotate(1deg); }
          30% { transform: translate(3px, 2px) rotate(0deg); }
          40% { transform: translate(1px, -1px) rotate(1deg); }
          50% { transform: translate(-1px, 2px) rotate(-1deg); }
          60% { transform: translate(-3px, 1px) rotate(0deg); }
          70% { transform: translate(3px, 1px) rotate(-1deg); }
          80% { transform: translate(-1px, -1px) rotate(1deg); }
          90% { transform: translate(1px, 2px) rotate(0deg); }
          100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

