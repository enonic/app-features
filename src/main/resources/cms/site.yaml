kind: "Site"
apis:
  - "asset"
  - "com.enonic.app.features:sse"
  - "com.enonic.app.features:websocket"
  - "com.enonic.app.features:websocket-public"
  - "com.enonic.app.features:cron"
  - "com.enonic.app.features:cron-sse"
  - "com.enonic.app.features:cron-ws"
processors:
  - name: "bgcolor-filter"
    order: 10
  - name: "branch-filter"
    order: 10
  - name: "app-header-filter"
    order: 10
mappings:
  - controller: "/services/cors/cors.js"
    order: 40
    invertPattern: false
    pattern: "/cors-demo"
  - controller: "/cms/mappings/controller.js"
    order: 50
    invertPattern: false
    pattern: "/controller"
  - controller: "/cms/mappings/sse-controller.js"
    order: 50
    invertPattern: false
    pattern: "/sse-mapping"
  - filter: "/cms/mappings/filter1.js"
    order: 50
    invertPattern: false
    pattern: "/filter1"
  - filter: "/cms/mappings/filter2.js"
    order: 50
    invertPattern: false
    pattern: "/"
