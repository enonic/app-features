<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Cron Demo</title>
</head>
<body data-th-attr="data-cron-api=${cronApiUrl},data-sse-url=${sseUrl},data-ws-url=${wsUrl}">
<h1>Cron Demo</h1>
<p>Uses <code>lib-cron</code> to push periodic ticks to SSE and WebSocket clients.</p>

<section>
    <h2>Controls</h2>
    <label>fixedDelay (ms) <input type="number" id="cron-delay" value="1500"></label>
    <button id="cron-schedule">schedule</button>
    <button id="cron-reschedule">reschedule</button>
    <button id="cron-unschedule">unschedule</button>
    <button id="cron-list">list</button>
    <button id="cron-get">get</button>
</section>

<section>
    <h2>SSE Ticks</h2>
    <div id="sse-status">Not connected</div>
    <ol id="sse-log"></ol>
</section>

<section>
    <h2>WebSocket Ticks</h2>
    <div id="ws-status">Not connected</div>
    <ol id="ws-log"></ol>
</section>

<section>
    <h2>Last API Response</h2>
    <pre id="cron-response"></pre>
</section>

<script data-th-src="${assetUrl}" defer></script>
</body>
</html>
