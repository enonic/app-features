kind: "ContentType"
superType: "base:structured"
abstract: false
final: false
allowChildContent: true
title: "Checkbox"
form:
  - type: "CheckBox"
    name: "checkbox"
    label: "Left-aligned checkbox (default)"
    helpText: "That's the help text!"
    occurrences:
      min: 0
      max: 1
  - type: "CheckBox"
    name: "checkbox2"
    label: "Right-aligned checkbox"
    occurrences:
      min: 0
      max: 1
    attributes:
      alignment: "right"
    alignment: "right"
  - type: "CheckBox"
    name: "checkbox3"
    label: "Bottom-aligned checkbox"
    occurrences:
      min: 0
      max: 1
    attributes:
      alignment: "bottom"
    alignment: "bottom"
