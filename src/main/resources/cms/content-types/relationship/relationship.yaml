kind: "ContentType"
superType: "base:structured"
abstract: false
final: false
allowChildContent: true
title: "Relationship"
form:
  - type: "ContentSelector"
    name: "myRelation"
    label: "A single DEFAULT relation to another content"
    occurrences:
      min: 0
      max: 1
    attributes:
      relationshipType: "system:reference"
  - type: "ContentSelector"
    name: "myLikeRelation"
    label: "A single LIKE relation to another content"
    occurrences:
      min: 0
      max: 1
    attributes:
      relationshipType: "system:reference"
  - type: "ContentSelector"
    name: "myUnrequiredUnlimitedRelationship"
