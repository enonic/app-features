superType: "base:structured"
abstract: false
final: false
allowChildContent: true
displayName: "All the Input Types"
form:
  - type: "ContentTypeFilter"
    name: "contentTypeFilter"
    label: "Content Type Filter"
    occurrences:
      min: 0
      max: 1
  - type: "ContentTypeFilter"
    name: "contentTypeFilter2"
    label: "Content Type Filter 2"
    occurrences:
      min: 0
      max: 1
    context: true
  - type: "CheckBox"
    name: "myCheckbox"
    label: "Checkbox"
    occurrences:
      min: 0
      max: 0
  - type: "ComboBox"
    name: "myComboBox"
    label: "ComboBox"
    occurrences:
      min: 0
      max: 0
    options:
      - value: "option1"
        label: "myOption 1"
      - value: "option2"
        label: "myOption 2"
  - type: "Date"
    name: "myDate"
    label: "Date"
    occurrences:
      min: 0
      max: 0
  - type: "DateTime"
    name: "myDateTime"
    label: "DateTime"
    occurrences:
      min: 0
      max: 0
  - type: "Double"
    name: "myDouble"
    label: "Double"
    occurrences:
      min: 0
      max: 0
  - type: "GeoPoint"
    name: "myGeoPoint"
    label: "GeoPoint"
    occurrences:
      min: 0
      max: 0
  - type: "HtmlArea"
    name: "myHtmlArea"
    label: "HtmlArea"
    occurrences:
      min: 0
      max: 0
  - type: "ImageSelector"
    name: "myImageSelector"
    label: "Image selector (tree-structured)"
    occurrences:
      min: 0
      max: 0
    treeMode: true
  - type: "ImageSelector"
    name: "myImageSelector2"
    label: "Image selector (flat - by default)"
    occurrences:
      min: 1
      max: 1
  - type: "MediaSelector"
    name: "myMediaSelector"
    label: "Media selector"
    occurrences:
      min: 1
      max: 1
    treeMode: true
  - type: "Long"
    name: "myLong"
    label: "Long"
    occurrences:
      min: 0
      max: 0
  - type: "ContentSelector"
    name: "myRelationship"
    label: "Content selector (flat)"
    occurrences:
      min: 0
      max: 0
    attributes:
      relationshipType: "system:reference"
  - type: "ContentSelector"
    name: "myRelationship2"
    label: "Content selector (tree-structured)"
    occurrences:
      min: 0
      max: 0
    attributes:
      relationshipType: "system:reference"
    treeMode: true
  - type: "ContentSelector"
    name: "myRelationship3"
    label: "Content selector (flat, filtered)"
    occurrences:
      min: 0
      max: 0
    attributes:
      relationshipType: "system:reference"
    allowContentType:
      - "landing-page"
  - type: "ContentSelector"
    name: "myRelationship4"
    label: "Content selector (tree-structured, filtered)"
    occurrences:
      min: 0
      max: 0
    attributes:
      relationshipType: "system:reference"
    allowContentType:
      - "landing-page"
    treeMode: true
  - type: "ContentSelector"
    name: "myRelationship5"
    label: "Content selector (tree-structured, with status)"
    occurrences:
      min: 0
      max: 0
    attributes:
      relationshipType: "system:reference"
      showStatus: "true"
    treeMode: true
  - type: "RadioButton"
    name: "myRadioButtons"
    label: "Radio Buttons"
    occurrences:
      min: 0
      max: 0
    options:
      - value: "option1"
        label: "myOption 1"
      - value: "option2"
        label: "myOption 2"
  - type: "Tag"
    name: "myTag"
    label: "Tag"
    occurrences:
      min: 0
      max: 0
  - type: "TextArea"
    name: "myTextArea"
    label: "TextArea"
    occurrences:
      min: 0
      max: 0
  - type: "TextLine"
    name: "myTextLine"
    label: "TextLine"
    occurrences:
      min: 0
      max: 0
  - type: "Time"
    name: "myTime"
    label: "Time"
    occurrences:
      min: 0
      max: 0
  - type: "FieldSet"
    label: "FieldSet"
    items:
      - type: "TextArea"
        name: "myTextAreas"
        label: "TextAreas"
        occurrences:
          min: 0
          max: 5
  - type: "ItemSet"
    name: "myItemSet"
    label: "ItemSet"
    occurrences:
      min: 0
      max: 5
    items:
      - type: "TextLine"
        name: "textLine"
        label: "TextLine"
        occurrences:
          min: 0
          max: 1
      - type: "Long"
        name: "long"
        label: "Long"
        occurrences:
          min: 0
          max: 1
  - type: "OptionSet"
    name: "checkOptionSet"
    expanded: true
    label: "Multi-selection OptionSet"
    occurrences:
      min: 1
      max: 1
    options:
      - name: "option_1"
        label: "Option 1"
        defaultOption: false
      - name: "option_2"
        label: "Option 2"
        defaultOption: true
        items:
          - type: "ContentSelector"
            name: "contentSelector"
            label: "Content selector"
            occurrences:
              min: 0
              max: 0
      - name: "option_3"
        label: "Option 3"
        defaultOption: false
        items:
          - type: "TextArea"
            name: "textarea"
            label: "Text Area"
            occurrences:
              min: 0
              max: 1
          - type: "Long"
            name: "long"
            label: "Long"
            occurrences:
              min: 0
              max: 1
    selected:
      min: 1
      max: 3
  - type: "OptionSet"
    name: "radioOptionSet"
    expanded: false
    label: "Single-selection OptionSet"
    occurrences:
      min: 1
      max: 1
    options:
      - name: "option_1"
        label: "Option 1"
        defaultOption: false
      - name: "option_2"
        label: "Option 2"
        defaultOption: false
        items:
          - type: "ContentSelector"
            name: "contentSelector"
            label: "Content selector"
            occurrences:
              min: 0
              max: 0
      - name: "option_3"
        label: "Option 3"
        defaultOption: false
        items:
          - type: "TextArea"
            name: "textarea"
            label: "Text Area"
            occurrences:
              min: 0
              max: 1
          - type: "Long"
            name: "long"
            label: "Long"
            occurrences:
              min: 0
              max: 1
    selected:
      min: 1
      max: 1
