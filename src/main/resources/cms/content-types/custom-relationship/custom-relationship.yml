superType: "base:structured"
abstract: false
final: false
allowChildContent: true
displayName: "Custom Relationship"
form:
  - type: "ContentSelector"
    name: "cited-in"
    label: "Cited In"
    occurrences:
      min: 0
      max: 0
    attributes:
      relationshipType: "com.enonic.app.features:citation"
  - type: "ContentSelector"
    name: "media-in-use"
    label: "Media in use"
    occurrences:
      min: 1
      max: 1
    attributes:
      relationshipType: "com.enonic.app.features:media-content"
  - type: "ContentSelector"
    name: "audio-or-image"
    label: "Audio or Image"
    occurrences:
      min: 0
      max: 0
    allowContentType:
      - "media:image"
      - "media:audio"
