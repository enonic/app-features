kind: "ContentType"
superType: "base:structured"
abstract: false
final: false
allowChildContent: true
title: "Display Name Expression"
displayNameExpression: "${firstName} ${middleName} ${lastName}"
displayNameListExpression: "${data.lastName}, ${data.firstName}"
form:
  - type: "TextLine"
    name: "firstName"
    label: "First name"
    occurrences:
      min: 1
      max: 1
  - type: "TextLine"
    name: "middleName"
    label: "Middle name"
    occurrences:
      min: 0
      max: 0
  - type: "TextLine"
    name: "lastName"
    label: "Last name"
    occurrences:
      min: 1
      max: 1
