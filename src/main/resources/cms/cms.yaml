kind: "CMS"
mixins:
  - name: "com.enonic.app.features:all-except-folders"
    allowContentTypes: "^(?!base:folder$).*"
    optional: true
  - name: "com.enonic.app.features:folders-only"
    allowContentTypes: "base:folder"
    optional: true
form:
  - type: "RadioButton"
    name: "backgroundColor"
    label: "Page background"
    occurrences:
      min: 0
      max: 1
    options:
      - value: "white"
        label: "White"
      - value: "grey"
        label: "Grey"
      - value: "blue"
        label: "Blue"
      - value: "red"
        label: "Red"
  - type: "TextLine"
    name: "recaptchaSiteKey"
    label: "reCAPTCHA site key"
    helpText: "Public site key from https://www.google.com/recaptcha/admin (read by lib-recaptcha)."
    occurrences:
      min: 0
      max: 1
  - type: "TextLine"
    name: "recaptchaSecretKey"
    label: "reCAPTCHA secret key"
    helpText: "Secret key from https://www.google.com/recaptcha/admin (read by lib-recaptcha)."
    occurrences:
      min: 0
      max: 1
