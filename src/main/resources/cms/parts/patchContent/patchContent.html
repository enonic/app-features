<div class="patch-content-part">
    <h2>Patch Content</h2>

    <form action="#" data-th-action="${postUrl}" method="post">
        <fieldset>
            <p>
                <label>Content Key (path or id)</label>
                <input name="key" type="text" data-th-value="${key}" style="width: 300px;" placeholder="/path/to/content or content-id"/>
            </p>

            <p>
                <label style="vertical-align: top">Patch Data (JSON)</label>
                <textarea name="patchData" data-th-utext="${patchData}" rows="8" style="width: 300px;" placeholder='{"displayName": "New Name", "data": {"field": "value"}}'></textarea>
            </p>

            <p>
                <label>Branches (comma-separated, optional)</label>
                <input name="branches" type="text" data-th-value="${branches}" style="width: 300px;" placeholder="draft,master"/>
            </p>

            <p>
                <label>
                    <input name="skipSync" type="checkbox" data-th-checked="${skipSync}"/>
                    Skip Sync
                </label>
            </p>

            <span style="color:darkred;" data-th-if="${errorMsg != null}" data-th-text="${errorMsg}"></span>
            <span style="color:darkgreen;" data-th-if="${msg != null}" data-th-text="${msg}"></span>

            <p>
                <button type="button" name="patch">Patch Content</button>
            </p>
        </fieldset>
    </form>

    <div data-th-if="${result != null}">
        <h3>Patch Result</h3>
        <pre data-th-text="${result}"></pre>
    </div>
</div>
